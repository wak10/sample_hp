<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #FFFFFF; -webkit-font-smoothing: antialiased; }
  ::selection { background: #1568D8; color: #FFFFFF; }
  input::placeholder, textarea::placeholder { color: #A6B3C2; }
</style>
</helmet>

<div style="font-family: 'Noto Sans JP', sans-serif; color: #14253D; background: #FFFFFF; overflow-x: hidden;">
  <dc-import name="SiteNav" hint-size="100%,76px"></dc-import>

  <header data-screen-label="Contact Hero" style="background: #F4F7FA; padding: 150px 44px 80px;">
    <div style="max-width: 1100px; margin: 0 auto;">
      <div style="display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; color: #8195A8; margin-bottom: 34px;">
        <a href="むすび%20コーポレートサイト.dc.html" style="color: #8195A8; text-decoration: none;" style-hover="color: #1568D8;">HOME</a>
        <span>/</span>
        <span style="color: #14253D;">お問い合わせ</span>
      </div>
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 22px;">
        <span style="width: 11px; height: 11px; background: #1568D8; border-radius: 2px;"></span>
        <span style="width: 11px; height: 11px; background: #E5B23C; border-radius: 2px;"></span>
        <span style="font-size: 13px; font-weight: 700; letter-spacing: 0.18em; color: #1568D8; margin-left: 4px;">CONTACT</span>
      </div>
      <h1 style="font-size: clamp(34px, 5.4vw, 76px); font-weight: 900; line-height: 1.3; letter-spacing: 0.01em;">
        <span style="color: #14253D;">お気軽に、</span><br>
        <span style="color: #1568D8;">ご相談ください。</span>
      </h1>
      <p style="font-size: clamp(15px, 1.4vw, 18px); font-weight: 500; line-height: 2; color: #5C6B7A; max-width: 640px; margin-top: 28px;">ブランディング、Webサイト、プロダクト開発。構想段階のご相談も歓迎です。通常2営業日以内にご返信いたします。</p>
    </div>
  </header>

  <section style="padding: 90px 44px 110px; max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.4fr 0.8fr; gap: 70px; align-items: start;">
    <!-- FORM -->
    <div>
      <sc-if value="{{ notSubmitted }}" hint-placeholder-val="{{ true }}">
      <form onSubmit="{{ onSubmit }}" style="display: flex; flex-direction: column; gap: 26px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 26px;">
          <label style="display: flex; flex-direction: column; gap: 9px;">
            <span style="font-size: 14px; font-weight: 700;">お名前 <span style="color: #1568D8;">*</span></span>
            <input type="text" required="required" placeholder="山田 太郎" style="font-family: inherit; font-size: 15px; padding: 14px 16px; border: 1.5px solid #DBE3EC; border-radius: 10px; background: #FFFFFF; color: #14253D; outline: none;" style-focus="border-color: #1568D8;" />
          </label>
          <label style="display: flex; flex-direction: column; gap: 9px;">
            <span style="font-size: 14px; font-weight: 700;">会社名</span>
            <input type="text" placeholder="株式会社〇〇" style="font-family: inherit; font-size: 15px; padding: 14px 16px; border: 1.5px solid #DBE3EC; border-radius: 10px; background: #FFFFFF; color: #14253D; outline: none;" style-focus="border-color: #1568D8;" />
          </label>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 26px;">
          <label style="display: flex; flex-direction: column; gap: 9px;">
            <span style="font-size: 14px; font-weight: 700;">メールアドレス <span style="color: #1568D8;">*</span></span>
            <input type="email" required="required" placeholder="you@example.com" style="font-family: inherit; font-size: 15px; padding: 14px 16px; border: 1.5px solid #DBE3EC; border-radius: 10px; background: #FFFFFF; color: #14253D; outline: none;" style-focus="border-color: #1568D8;" />
          </label>
          <label style="display: flex; flex-direction: column; gap: 9px;">
            <span style="font-size: 14px; font-weight: 700;">電話番号</span>
            <input type="tel" placeholder="03-0000-0000" style="font-family: inherit; font-size: 15px; padding: 14px 16px; border: 1.5px solid #DBE3EC; border-radius: 10px; background: #FFFFFF; color: #14253D; outline: none;" style-focus="border-color: #1568D8;" />
          </label>
        </div>
        <label style="display: flex; flex-direction: column; gap: 9px;">
          <span style="font-size: 14px; font-weight: 700;">お問い合わせ種別</span>
          <select style="font-family: inherit; font-size: 15px; padding: 14px 16px; border: 1.5px solid #DBE3EC; border-radius: 10px; background: #FFFFFF; color: #14253D; outline: none;" style-focus="border-color: #1568D8;">
            <option>ブランド戦略について</option>
            <option>Webサイト制作について</option>
            <option>プロダクト開発について</option>
            <option>グロース支援について</option>
            <option>採用について</option>
            <option>その他</option>
          </select>
        </label>
        <label style="display: flex; flex-direction: column; gap: 9px;">
          <span style="font-size: 14px; font-weight: 700;">お問い合わせ内容 <span style="color: #1568D8;">*</span></span>
          <textarea required="required" rows="6" placeholder="ご相談内容をご記入ください。" style="font-family: inherit; font-size: 15px; padding: 14px 16px; border: 1.5px solid #DBE3EC; border-radius: 10px; background: #FFFFFF; color: #14253D; outline: none; resize: vertical;" style-focus="border-color: #1568D8;"></textarea>
        </label>
        <label style="display: flex; align-items: center; gap: 12px; font-size: 14px; color: #34465A;">
          <input type="checkbox" required="required" style="width: 18px; height: 18px; accent-color: #1568D8;" />
          <span><a href="#" style="color: #1568D8; text-decoration: underline;">プライバシーポリシー</a>に同意します</span>
        </label>
        <button type="submit" style="margin-top: 8px; align-self: flex-start; background: #1568D8; color: #FFFFFF; border: none; font-family: inherit; font-size: 16px; font-weight: 700; padding: 18px 48px; border-radius: 100px; cursor: pointer; display: inline-flex; align-items: center; gap: 14px; transition: background 0.2s;" style-hover="background: #0F4FA8;">
          送信する <span style="opacity: 0.5; font-weight: 400;">|</span> <span>→</span>
        </button>
      </form>
      </sc-if>

      <sc-if value="{{ submitted }}" hint-placeholder-val="{{ false }}">
      <div style="background: #F4F7FA; border: 1px solid #E3E9F0; border-radius: 18px; padding: 60px 48px; text-align: center;">
        <div style="display: inline-flex; gap: 5px; margin-bottom: 24px;">
          <span style="width: 14px; height: 14px; background: #1568D8; border-radius: 2px;"></span>
          <span style="width: 14px; height: 14px; background: #E5B23C; border-radius: 2px;"></span>
        </div>
        <h2 style="font-size: 26px; font-weight: 900; margin-bottom: 16px;">送信が完了しました</h2>
        <p style="font-size: 15px; line-height: 1.9; color: #5C6B7A;">お問い合わせいただきありがとうございます。<br>担当者より2営業日以内にご返信いたします。</p>
        <a href="むすび%20コーポレートサイト.dc.html" style="display: inline-flex; align-items: center; gap: 12px; margin-top: 32px; text-decoration: none; color: #1568D8; border: 1.5px solid #1568D8; font-size: 14px; font-weight: 700; padding: 14px 30px; border-radius: 100px;" style-hover="background: #1568D8; color: #FFFFFF;">トップへ戻る</a>
      </div>
      </sc-if>
    </div>

    <!-- CONTACT INFO -->
    <aside style="background: #F4F7FA; border-radius: 18px; padding: 40px 34px; display: flex; flex-direction: column; gap: 30px;">
      <div>
        <div style="font-size: 12px; font-weight: 700; letter-spacing: 0.14em; color: #A6B3C2; margin-bottom: 8px;">EMAIL</div>
        <a href="mailto:hello@musubi.studio" style="font-size: 17px; font-weight: 700; color: #1568D8; text-decoration: none;">hello@musubi.studio</a>
      </div>
      <div>
        <div style="font-size: 12px; font-weight: 700; letter-spacing: 0.14em; color: #A6B3C2; margin-bottom: 8px;">TEL</div>
        <div style="font-size: 17px; font-weight: 700;">03-0000-0000</div>
        <div style="font-size: 13px; color: #5C6B7A; margin-top: 4px;">平日 10:00 – 18:00</div>
      </div>
      <div>
        <div style="font-size: 12px; font-weight: 700; letter-spacing: 0.14em; color: #A6B3C2; margin-bottom: 8px;">ADDRESS</div>
        <div style="font-size: 15px; line-height: 1.8; color: #14253D;">〒150-0001<br>東京都渋谷区神宮前0-0-0<br>MUSUBI Building 4F</div>
      </div>
    </aside>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,440px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 1024}}">
class Component extends DCLogic {
  state = { submitted: false };
  renderVals() {
    return {
      submitted: this.state.submitted,
      notSubmitted: !this.state.submitted,
      onSubmit: (e) => { e.preventDefault(); this.setState({ submitted: true }); window.scrollTo({ top: 0, behavior: "smooth" }); },
    };
  }
}
</script>
</body>
</html>
