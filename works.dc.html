<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #FFFFFF; -webkit-font-smoothing: antialiased; }
  ::selection { background: #1568D8; color: #FFFFFF; }
</style>
</helmet>

<div style="font-family: 'Noto Sans JP', sans-serif; color: #14253D; background: #FFFFFF; overflow-x: hidden;">
  <dc-import name="SiteNav" hint-size="100%,76px"></dc-import>

  <header data-screen-label="Works Hero" style="background: #F4F7FA; padding: 150px 44px 80px;">
    <div style="max-width: 1480px; margin: 0 auto;">
      <div style="display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; color: #8195A8; margin-bottom: 34px;">
        <a href="むすび%20コーポレートサイト.dc.html" style="color: #8195A8; text-decoration: none;" style-hover="color: #1568D8;">HOME</a>
        <span>/</span>
        <span style="color: #14253D;">実績一覧</span>
      </div>
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 22px;">
        <span style="width: 11px; height: 11px; background: #1568D8; border-radius: 2px;"></span>
        <span style="width: 11px; height: 11px; background: #E5B23C; border-radius: 2px;"></span>
        <span style="font-size: 13px; font-weight: 700; letter-spacing: 0.18em; color: #1568D8; margin-left: 4px;">WORKS</span>
      </div>
      <h1 style="font-size: clamp(34px, 5.4vw, 76px); font-weight: 900; line-height: 1.3; letter-spacing: 0.01em;">
        <span style="color: #14253D;">私たちが手がけた、</span><br>
        <span style="color: #1568D8;">確かな実績。</span>
      </h1>
    </div>
  </header>

  <!-- FILTER + GRID -->
  <section style="padding: 56px 44px 100px; max-width: 1480px; margin: 0 auto;">
    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 48px;">
      <sc-for list="{{ filters }}" as="f" hint-placeholder-count="5">
        <span style="font-size: 14px; font-weight: 700; padding: 11px 22px; border-radius: 100px; border: 1.5px solid {{ f.border }}; color: {{ f.color }}; background: {{ f.bg }}; cursor: pointer;">{{ f.label }}</span>
      </sc-for>
    </div>

    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 48px 36px;">
      <sc-for list="{{ works }}" as="w" hint-placeholder-count="6">
        <a href="work-detail.dc.html" style="text-decoration: none; color: inherit; display: block; cursor: pointer;">
          <div style="height: 340px; border-radius: 18px; overflow: hidden; position: relative; background-color: #EAF0F7; background-image: repeating-linear-gradient(135deg, rgba(21,104,216,0.06) 0 1px, transparent 1px 14px); display: flex; align-items: center; justify-content: center; transition: transform 0.35s ease, box-shadow 0.35s ease;" style-hover="transform: translateY(-6px); box-shadow: 0 20px 44px rgba(20,37,61,0.12);">
            <span style="font-size: 13px; font-weight: 500; color: #8195A8;">[ {{ w.img }} ]</span>
            <span style="position: absolute; top: 18px; left: 20px; font-size: 12px; font-weight: 700; color: #FFFFFF; background: #1568D8; padding: 5px 12px; border-radius: 100px;">{{ w.year }}</span>
          </div>
          <div style="display: flex; align-items: baseline; justify-content: space-between; margin-top: 22px; gap: 16px;">
            <h3 style="font-size: 22px; font-weight: 700;">{{ w.title }}</h3>
            <span style="font-size: 13px; font-weight: 700; color: #1568D8; white-space: nowrap;">{{ w.cat }}</span>
          </div>
          <p style="font-size: 14px; color: #5C6B7A; margin-top: 7px;">{{ w.client }}</p>
        </a>
      </sc-for>
    </div>
  </section>

  <dc-import name="SiteCTA" hint-size="100%,520px"></dc-import>
  <dc-import name="SiteFooter" hint-size="100%,440px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 1024}}">
class Component extends DCLogic {
  renderVals() {
    return {
      filters: [
        { label: "すべて", color: "#FFFFFF", bg: "#1568D8", border: "#1568D8" },
        { label: "Branding", color: "#1568D8", bg: "#FFFFFF", border: "#CBD9EC" },
        { label: "Web / EC", color: "#1568D8", bg: "#FFFFFF", border: "#CBD9EC" },
        { label: "Product", color: "#1568D8", bg: "#FFFFFF", border: "#CBD9EC" },
        { label: "Campaign", color: "#1568D8", bg: "#FFFFFF", border: "#CBD9EC" },
      ],
      works: [
        { img: "project image 01", year: "2025", title: "Kanade Rebrand", cat: "Branding", client: "株式会社カナデ — コーポレートリブランディング" },
        { img: "project image 02", year: "2025", title: "TŌGEN EC Platform", cat: "Web / EC", client: "桃源株式会社 — D2Cブランドサイト構築" },
        { img: "project image 03", year: "2024", title: "Liberta App", cat: "Product", client: "Liberta Inc. — モバイルアプリUIデザイン" },
        { img: "project image 04", year: "2024", title: "Sora Campaign", cat: "Campaign", client: "Sora — プロダクトローンチサイト" },
        { img: "project image 05", year: "2023", title: "Meguro Visual Identity", cat: "Branding", client: "MEGURO Co. — VI / ロゴ刷新" },
        { img: "project image 06", year: "2023", title: "Libra Dashboard", cat: "Product", client: "Libra — 業務SaaSのUI再設計" },
      ],
    };
  }
}
</script>
</body>
</html>
