<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #FFFFFF; -webkit-font-smoothing: antialiased; }
  ::selection { background: #1568D8; color: #FFFFFF; }
</style>
</helmet>

<div style="font-family: 'Noto Sans JP', sans-serif; color: #14253D; background: #FFFFFF; overflow-x: hidden;">
  <dc-import name="SiteNav" hint-size="100%,76px"></dc-import>

  <header data-screen-label="Case Hero" style="background: #F4F7FA; padding: 150px 44px 0;">
    <div style="max-width: 1100px; margin: 0 auto;">
      <div style="display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; color: #8195A8; margin-bottom: 34px;">
        <a href="むすび%20コーポレートサイト.dc.html" style="color: #8195A8; text-decoration: none;" style-hover="color: #1568D8;">HOME</a>
        <span>/</span>
        <a href="works.dc.html" style="color: #8195A8; text-decoration: none;" style-hover="color: #1568D8;">実績一覧</a>
        <span>/</span>
        <span style="color: #14253D;">Kanade Rebrand</span>
      </div>
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
        <span style="width: 11px; height: 11px; background: #1568D8; border-radius: 2px;"></span>
        <span style="width: 11px; height: 11px; background: #E5B23C; border-radius: 2px;"></span>
        <span style="font-size: 13px; font-weight: 700; letter-spacing: 0.18em; color: #1568D8; margin-left: 4px;">CASE STUDY</span>
      </div>
      <h1 style="font-size: clamp(32px, 4.8vw, 64px); font-weight: 900; line-height: 1.25; margin-bottom: 22px;">Kanade Rebrand</h1>
      <p style="font-size: 17px; line-height: 1.9; color: #5C6B7A; font-weight: 500; max-width: 720px; padding-bottom: 50px;">創業30年を迎える株式会社カナデの、次の世代へ向けたコーポレートリブランディング。受け継いできた価値を守りながら、未来へ踏み出す姿勢をかたちにしました。</p>
    </div>
  </header>

  <!-- META BAR -->
  <section style="background: #F4F7FA; padding: 0 44px 80px;">
    <div style="max-width: 1100px; margin: 0 auto;">
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; padding: 36px 0; border-top: 1px solid #DEE6EE;">
        <sc-for list="{{ meta }}" as="m" hint-placeholder-count="4">
          <div>
            <div style="font-size: 12px; font-weight: 700; letter-spacing: 0.12em; color: #A6B3C2; margin-bottom: 8px;">{{ m.k }}</div>
            <div style="font-size: 15px; font-weight: 700; color: #14253D;">{{ m.v }}</div>
          </div>
        </sc-for>
      </div>
    </div>
  </section>

  <!-- MAIN IMAGE -->
  <section style="padding: 70px 44px 0; max-width: 1100px; margin: 0 auto;">
    <div style="height: clamp(300px, 40vw, 560px); border-radius: 22px; background-color: #EAF0F7; background-image: repeating-linear-gradient(135deg, rgba(21,104,216,0.06) 0 1px, transparent 1px 14px); display: flex; align-items: center; justify-content: center;">
      <span style="font-size: 13px; font-weight: 500; color: #8195A8; background: rgba(255,255,255,0.9); padding: 9px 18px; border-radius: 100px;">[ key visual — メインビジュアル ]</span>
    </div>
  </section>

  <!-- BODY SECTIONS -->
  <section style="padding: 80px 44px; max-width: 820px; margin: 0 auto;">
    <sc-for list="{{ sections }}" as="s" hint-placeholder-count="3">
      <div style="margin-bottom: 56px;">
        <h2 style="font-size: clamp(22px, 2.6vw, 30px); font-weight: 900; margin-bottom: 18px; display: flex; align-items: center; gap: 14px;">
          <span style="width: 8px; height: 24px; background: #1568D8; border-radius: 2px;"></span>
          {{ s.title }}
        </h2>
        <p style="font-size: 16px; line-height: 2.1; color: #34465A;">{{ s.body }}</p>
      </div>
    </sc-for>

    <!-- inline two images -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 10px 0 20px;">
      <div style="aspect-ratio: 4/3; border-radius: 16px; background-color: #EAF0F7; background-image: repeating-linear-gradient(135deg, rgba(21,104,216,0.06) 0 1px, transparent 1px 14px); display: flex; align-items: center; justify-content: center;"><span style="font-size: 12px; color: #8195A8;">[ detail 01 ]</span></div>
      <div style="aspect-ratio: 4/3; border-radius: 16px; background-color: #EAF0F7; background-image: repeating-linear-gradient(135deg, rgba(21,104,216,0.06) 0 1px, transparent 1px 14px); display: flex; align-items: center; justify-content: center;"><span style="font-size: 12px; color: #8195A8;">[ detail 02 ]</span></div>
    </div>
  </section>

  <!-- OUTCOME -->
  <section style="background: #F4F7FA; padding: 90px 44px;">
    <div style="max-width: 1100px; margin: 0 auto;">
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 40px;">
        <span style="width: 11px; height: 11px; background: #1568D8; border-radius: 2px;"></span>
        <span style="width: 11px; height: 11px; background: #E5B23C; border-radius: 2px;"></span>
        <span style="font-size: 13px; font-weight: 700; letter-spacing: 0.18em; color: #1568D8; margin-left: 4px;">OUTCOME</span>
      </div>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
        <sc-for list="{{ outcome }}" as="o" hint-placeholder-count="3">
          <div style="background: #FFFFFF; border: 1px solid #E3E9F0; border-radius: 16px; padding: 38px 32px;">
            <div style="font-size: 52px; font-weight: 900; line-height: 1; color: #14253D;">{{ o.value }}<span style="font-size: 22px; color: #1568D8;">{{ o.unit }}</span></div>
            <div style="font-size: 14px; font-weight: 500; color: #5C6B7A; margin-top: 14px; line-height: 1.7;">{{ o.label }}</div>
          </div>
        </sc-for>
      </div>
    </div>
  </section>

  <!-- NEXT -->
  <section style="padding: 70px 44px; max-width: 1100px; margin: 0 auto; text-align: center;">
    <a href="works.dc.html" style="display: inline-flex; align-items: center; gap: 16px; text-decoration: none; color: #1568D8; background: #FFFFFF; border: 1.5px solid #1568D8; font-size: 15px; font-weight: 700; padding: 16px 38px; border-radius: 100px; transition: background 0.2s, color 0.2s;" style-hover="background: #1568D8; color: #FFFFFF;">
      <span>←</span> 実績一覧に戻る
    </a>
  </section>

  <dc-import name="SiteCTA" hint-size="100%,520px"></dc-import>
  <dc-import name="SiteFooter" hint-size="100%,440px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 1024}}">
class Component extends DCLogic {
  renderVals() {
    return {
      meta: [
        { k: "CLIENT", v: "株式会社カナデ" },
        { k: "YEAR", v: "2025" },
        { k: "SERVICES", v: "ブランド戦略 / VI / Web" },
        { k: "ROLE", v: "戦略・デザイン・実装" },
      ],
      sections: [
        { title: "課題 — Challenge", body: "創業30年。確かな技術と信頼を積み重ねてきた一方で、ブランドの見え方が時代に追いつかず、若い世代の採用や新規顧客への訴求に課題を抱えていました。受け継いできた価値を損なわずに、どう次の世代へつなぐか。それが出発点でした。" },
        { title: "アプローチ — Approach", body: "経営陣と現場、双方への徹底したインタビューから、カナデが本当に大切にしてきた価値を言語化することから始めました。「変えるもの」と「変えないもの」を明確に切り分け、ブランドの核を再定義。その指針をもとに、ロゴ・タイポグラフィ・カラーからコーポレートサイトまでを一貫して設計しました。" },
        { title: "成果 — Result", body: "リブランディング後、コーポレートサイトの問い合わせ数は大きく伸長し、採用エントリーも増加。社内からも「自分たちの会社を誇れるようになった」という声が上がり、ブランドが事業と組織の両面で機能し始めています。" },
      ],
      outcome: [
        { value: "2.4", unit: "x", label: "サイト経由の問い合わせ数（前年比）" },
        { value: "180", unit: "%", label: "採用エントリー数の増加" },
        { value: "30", unit: "yr", label: "受け継いだ価値を、次の世代へ" },
      ],
    };
  }
}
</script>
</body>
</html>
